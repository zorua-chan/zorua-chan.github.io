<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL // SHINXISM_PROXY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --glass-bg: rgba(255, 105, 180, 0.05);
            --glass-border: rgba(255, 105, 180, 0.2);
            --neon-pink: rgba(255, 105, 180, 0.8);
            --neon-red: rgba(255, 77, 77, 0.8);
        }
        
        body { 
            background-color: #070709; 
            overflow: hidden; 
            font-family: 'Courier New', monospace; 
            color: #fce7f3; /* text-pink-100 */
        }

        /* Glassmorphism Panel */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(255, 105, 180, 0.05);
        }

        /* CRT Scanline Overlay */
        .scanlines {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 6px 100%; 
            z-index: 50; 
            pointer-events: none;
        }

        /* Typography Highlights */
        .glow-text-pink { text-shadow: 0 0 10px var(--neon-pink); }
        .glow-text-red { text-shadow: 0 0 10px var(--neon-red); }
        
        /* Particle Canvas */
        #glitter-engine { position: absolute; top: 0; left: 0; z-index: -1; }
        
        /* Custom Scrollbar for Terminal Output */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        ::-webkit-scrollbar-thumb { background: rgba(255, 105, 180, 0.3); border-radius: 3px; }
    </style>
</head>
<body class="h-screen w-screen flex items-center justify-center selection:bg-pink-500/30">

    <canvas id="glitter-engine"></canvas>
    <div class="scanlines"></div>

    <main class="glass-panel w-[90%] max-w-2xl p-6 rounded-xl relative z-10 flex flex-col gap-5 shadow-[0_0_40px_rgba(255,77,77,0.1)]">
        
        <header class="flex justify-between items-center border-b border-pink-500/20 pb-3">
            <span class="text-xs text-red-400 tracking-widest font-bold glow-text-red">SECURE_SHELL // SHINXISM</span>
            <div class="flex gap-2">
                <div class="w-3 h-3 rounded-full bg-red-500/60 shadow-[0_0_8px_rgba(255,77,77,0.8)]"></div>
                <div class="w-3 h-3 rounded-full bg-pink-500/60 shadow-[0_0_8px_rgba(255,105,180,0.8)]"></div>
                <div class="w-3 h-3 rounded-full bg-pink-300/60"></div>
            </div>
        </header>

        <section class="flex items-center gap-5 bg-black/20 p-4 rounded-lg border border-pink-500/10">
            <img src="https://i.pinimg.com/564x/c5/b9/f8/c5b9f8b7c350557d9faf632e60b0cda0.jpg" alt="Entity Visual" class="w-20 h-20 rounded border border-pink-400/40 shadow-[0_0_15px_rgba(255,105,180,0.3)] object-cover">
            <div>
                <h1 class="glow-text-red text-lg font-extrabold text-red-300">UNAUTHORIZED ENTITY DETECTED</h1>
                <p class="text-sm text-pink-200/80 mt-1">Warning: Invalid clearance will result in immediate payload injection.</p>
                <p class="text-xs text-pink-300/50 mt-1 italic">Hint: Inspect the architecture.</p>
            </div>
        </section>

        <div id="terminal-output" class="text-sm h-36 overflow-y-auto flex flex-col gap-1 text-pink-100/90 font-mono">
            <p>> Handshake established across port 443.</p>
            <p>> Awaiting clearance cipher...</p>
        </div>

        <div class="flex items-center gap-3 mt-2">
            <span class="text-red-400 font-bold glow-text-red">root@proxy:~#</span>
            <input type="text" id="cmd-input" class="bg-transparent border-none outline-none text-pink-100 flex-1 caret-pink-500 font-mono text-sm" autocomplete="off" spellcheck="false" autofocus>
        </div>

    </main>

    <script>
        /** * MODULE: Glitter Particle Engine
         * Optimized hardware-accelerated canvas rendering.
         */
        const canvas = document.getElementById('glitter-engine');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particlesArray = [];
        const colors = ['rgba(255, 105, 180, 0.8)', 'rgba(255, 182, 193, 0.8)', 'rgba(255, 77, 77, 0.8)', 'rgba(255, 255, 255, 0.5)'];

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height - canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedY = Math.random() * 1.5 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.opacity = Math.random() * 0.5 + 0.2;
            }
            update() {
                this.y += this.speedY;
                this.x += this.speedX;
                if (this.y > canvas.height) {
                    this.y = 0 - this.size;
                    this.x = Math.random() * canvas.width;
                }
            }
            draw() {
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            for (let i = 0; i < 150; i++) particlesArray.push(new Particle());
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            requestAnimationFrame(animateParticles);
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        initParticles();
        animateParticles();

        /** * MODULE: Gatekeeper Security Logic
         * Handles OSINT challenge verification and payload injection.
         */
        const inputField = document.getElementById('cmd-input');
        const outputLog = document.getElementById('terminal-output');
        let attempts = 0;
        const maxAttempts = 3;
        const cipher = "chaotic_uwu";
        const meowrollPayload = "https://www.youtube.com/watch?v=hvL1339luv0";

        function printLog(text, colorClass = "text-pink-100/90") {
            const p = document.createElement('p');
            p.className = colorClass;
            p.textContent = `> ${text}`;
            outputLog.appendChild(p);
            outputLog.scrollTop = outputLog.scrollHeight;
        }

        inputField.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                const command = this.value.trim().toLowerCase();
                this.value = '';

                if (command === '') return;
                
                printLog(command, "text-pink-300"); // Echo input

                if (command === cipher) {
                    printLog("ACCESS GRANTED. Overriding security protocols...", "text-green-400 glow-text-red");
                    setTimeout(() => {
                        // This will eventually route to hub.html
                        printLog("Routing to main hub (Simulation complete).", "text-green-400");
                    }, 1500);
                } else {
                    attempts++;
                    const remaining = maxAttempts - attempts;
                    
                    if (remaining > 0) {
                        printLog(`ERR: Invalid cipher. ${remaining} attempts remaining before payload injection.`, "text-red-400 glow-text-red");
                    } else {
                        printLog("CRITICAL FAILURE. Deploying Meowroll payload...", "text-red-500 font-bold glow-text-red");
                        inputField.disabled = true;
                        setTimeout(() => {
                            window.location.href = meowrollPayload;
                        }, 1200);
                    }
                }
            }
        });
    </script>
</body>
</html>
