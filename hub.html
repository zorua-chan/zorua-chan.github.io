<!DOCTYPE html>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            /* Light, semi-transparent pinkish-reddish base */
            --glass-bg: rgba(255, 105, 180, 0.12);
            --glass-border: rgba(255, 105, 180, 0.3);
            --neon-pink: rgba(255, 105, 180, 0.8);
            --pastel-pink: #ffb6c1;
        }
        
        body { 
            background-color: #070709; 
            font-family: 'Courier New', monospace; 
            color: #fce7f3;
            /* Assume glitter canvas and scanlines are running in the background as per previous architecture */
        }

        /* The Containment Unit */
        .hub-terminal {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6), inset 0 0 20px rgba(255, 105, 180, 0.1);
        }

        /* Typography & Glows */
        .glow-title { text-shadow: 0 0 15px var(--neon-pink); }
        .glow-pastel { text-shadow: 0 0 8px var(--pastel-pink); }
        .glitch-hover:hover { text-shadow: 2px 0 0 red, -2px 0 0 cyan; }
        
        /* Whimsical Button Font Fallback */
        .font-cartoon { font-family: 'Comic Sans MS', 'Chalkboard SE', 'Comic Neue', cursive; }

        /* Sticker Layering */
        .sticker { filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5)); pointer-events: none; }
    </style>
</head>
