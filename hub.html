<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUB // CENTRAL_NEXUS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(20, 10, 15, 0.6);
            --glass-border: rgba(255, 105, 180, 0.3);
            --neon-pink: #ff69b4;
            --neon-glow: rgba(255, 105, 180, 0.6);
            --terminal-font: 'JetBrains Mono', 'Courier New', monospace;
            --whimsy-font: 'Comic Neue', cursive;
        }

        body {
            background-color: #050507;
            /* Improved radial gradient for depth */
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(255, 77, 106, 0.08) 0%, transparent 50%),
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 100%, 100% 2px, 3px 100%;
            font-family: var(--terminal-font);
            color: #fce7f3;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            padding: 1rem;
            perspective: 1000px; /* Enables 3D space */
        }

        /* CRT Scanline Effect */
        body::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        /* Glassmorphism Architecture */
        .terminal-box {
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--glass-border);
            box-shadow: 
                0 0 0 1px rgba(255, 105, 180, 0.1),
                0 20px 50px rgba(0, 0, 0, 0.8), 
                inset 0 0 40px rgba(255, 105, 180, 0.05);
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
        }

        /* Typography Highlights */
        .glow-title { 
            text-shadow: 0 0 10px var(--neon-pink), 0 0 20px var(--neon-pink); 
            letter-spacing: 0.1em;
        }
        
        .glow-border { 
            box-shadow: 0 0 15px var(--neon-glow); 
        }

        /* Sticker Physics with Parallax */
        .sticker {
            position: absolute;
            z-index: 0;
            pointer-events: none;
            user-select: none;
            filter: drop-shadow(0 15px 15px rgba(0,0,0,0.6));
            transition: transform 0.1s linear; /* Smooth follow */
            will-change: transform;
        }

        /* Floating Animation Keyframes */
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(var(--rot)); }
            50% { transform: translateY(-10px) rotate(calc(var(--rot) + 2deg)); }
        }

        .sticker-float {
            animation: float 6s ease-in-out infinite;
        }

        /* Text Containment (Matrix) */
        .lore-matrix {
            position: relative;
            z-index: 10;
            background: rgba(0, 0, 0, 0.5);
            border: 1px dashed rgba(255, 105, 180, 0.3);
            backdrop-filter: blur(4px);
            min-height: 200px; /* Prevent layout shift during typing */
        }

        /* Terminal List Styles */
        .terminal-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .terminal-line {
            display: flex;
            gap: 0.75rem;
            opacity: 0; /* Hidden initially for JS effect */
            animation: fadeIn 0.5s forwards;
        }
        .prompt { color: var(--neon-pink); font-weight: bold; min-width: 20px;}
        
        /* Blinking Cursor */
        .cursor {
            display: inline-block;
            width: 8px;
            height: 1.2em;
            background-color: var(--neon-pink);
            animation: blink 1s step-end infinite;
            vertical-align: middle;
            margin-left: 4px;
        }

        @keyframes blink { 50% { opacity: 0; } }
        @keyframes fadeIn { to { opacity: 1; } }

        /* Button Dynamics */
        .btn-whimsy {
            font-family: var(--whimsy-font);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }
        
        .btn-whimsy::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: 0.5s;
        }
        
        .btn-whimsy:hover::before {
            left: 100%;
        }

        .btn-whimsy:hover {
            transform: scale(1.1) rotate(-2deg);
            box-shadow: 0 0 30px rgba(255, 77, 77, 0.8), inset 0 0 20px rgba(255,255,255,0.5);
            letter-spacing: 2px;
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .sticker { opacity: 0.6; transform: scale(0.7) !important; }
            /* Hide overlapping stickers on mobile to save space */
            .sticker.mobile-hide { display: none; }
        }
    </style>
</head>
<body class="selection:bg-pink-500/30">

    <main class="terminal-box w-full max-w-4xl p-6 md:p-10 rounded-3xl flex flex-col gap-8" id="mainCard">
        
        <!-- Sticker Layer: Organized absolutely over the card -->
        <div id="sticker-layer" class="absolute inset-0 overflow-hidden pointer-events-none rounded-3xl">
            
            <!-- Croatia -->
            <img src="croatia.png" alt="Croatiaball" 
                 class="sticker sticker-float w-24 md:w-32" 
                 style="--rot: 18deg; top: 10%; right: -5%;"
                 data-speed="2">
            
            <!-- Germany Cat -->
            <img src="gcat.png" alt="Germany Cat" 
                 class="sticker sticker-float w-32 md:w-48" 
                 style="--rot: -12deg; top: 30%; left: -10%; animation-delay: 1s;"
                 data-speed="3">
            
            <!-- Hisuian Zorua -->
            <img src="zorua-hisui.png" alt="Hisuian Zorua" 
                 class="sticker sticker-float w-36 md:w-56" 
                 style="--rot: -8deg; top: 40%; right: -5%; animation-delay: 2s;"
                 data-speed="2.5">
            
            <!-- Pythowo -->
            <img src="pythowo.png" alt="Pythowo" 
                 class="sticker sticker-float w-20 md:w-28" 
                 style="--rot: 22deg; bottom: 20%; left: 0%; animation-delay: 0.5s;"
                 data-speed="4">
            
            <!-- Luxray (Clipped at bottom) -->
            <!-- Using translate-y to push it down, and translate-y-[45%] as requested to clip -->
            <img src="luxray.png" alt="Luxray" 
                 class="sticker sticker-float w-48 md:w-64 absolute bottom-0 right-[25%] translate-y-[45%]" 
                 style="--rot: 5deg; z-index: 5; animation-delay: 1.5s;"
                 data-speed="1.5">
        </div>

        <header class="relative z-10 flex flex-col md:flex-row items-center gap-6 border-b border-pink-500/30 pb-6">
            <figure class="relative group">
                <div class="absolute -inset-1 bg-gradient-to-r from-pink-600 to-purple-600 rounded-lg blur opacity-40 group-hover:opacity-75 transition duration-1000 group-hover:duration-200"></div>
                <img src="zoruapfp.jpg" alt="Profile Avatar" class="relative w-20 h-20 md:w-24 md:h-24 rounded-lg object-cover rotate-[6deg] border-2 border-pink-400 shadow-lg transition-transform duration-300 group-hover:rotate-0 group-hover:scale-105">
            </figure>
            
            <div class="text-center md:text-left">
                <h2 class="text-pink-400 text-xs tracking-[0.3em] font-bold mb-1">USER.AUTHENTICATED</h2>
                <h1 class="text-3xl md:text-5xl font-extrabold text-pink-100 glow-title">
                    ZORUA // SHINX
                </h1>
            </div>
        </header>

        <section class="lore-matrix rounded-xl p-6 text-pink-100/90 text-sm md:text-base leading-relaxed shadow-inner flex flex-col">
            <ul class="terminal-list" id="terminal-text">
                <!-- Content injected via JS for typing effect -->
            </ul>
            <span class="cursor ml-7"></span>
        </section>

        <section class="relative z-10 flex flex-col items-center justify-center gap-4 mt-2">
            
            <div class="flex flex-col items-center opacity-0 animate-fade-in-up" style="animation: fadeIn 1s ease-out 3s forwards;">
                <span class="text-pink-300 font-bold tracking-widest text-xs mb-2 uppercase">Initialize Protocol?</span>
                
                <svg width="40" height="40" viewBox="0 0 40 40" fill="none" stroke="#ffb6c1" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="animate-bounce mb-2" style="filter: drop-shadow(0 0 8px rgba(255, 182, 193, 0.8));">
                    <path d="M20 5 Q 35 20 20 35 M 12 27 L 20 35 L 28 27" />
                </svg>
            </div>

            <a href="shinxism.html" class="btn-whimsy opacity-0 bg-gradient-to-r from-pink-500 to-red-500 text-white text-xl md:text-2xl px-12 py-4 rounded-full border-2 border-white/50 shadow-[0_0_20px_rgba(255,105,180,0.5)] tracking-wider outline-none cursor-pointer font-bold" style="animation: fadeIn 1s ease-out 3.5s forwards;">
                ENTER_SYSTEM
            </a>
            
        </section>

    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // --- 1. Terminal Typing Effect ---
            const lines = [
                "balkanese tomboy :P",
                "good at rimac simping and still lazy writing codes in snek c:",
                "aspiring pentester and malware analyst",
                "lover of chocolate",
                "cats are great meow",
                "founder of shinxism cult - do study or procastrinate, thats da question"
            ];
            
            const listContainer = document.getElementById('terminal-text');
            let lineIndex = 0;
            let charIndex = 0;
            let currentLineElement = null;

            function typeWriter() {
                if (lineIndex < lines.length) {
                    if (!currentLineElement) {
                        // Create new line
                        currentLineElement = document.createElement('li');
                        currentLineElement.className = 'terminal-line mb-3';
                        currentLineElement.innerHTML = `<span class="prompt">></span><span class="text-content"></span>`;
                        listContainer.appendChild(currentLineElement);
                    }

                    const textSpan = currentLineElement.querySelector('.text-content');
                    const currentText = lines[lineIndex];

                    if (charIndex < currentText.length) {
                        textSpan.textContent += currentText.charAt(charIndex);
                        charIndex++;
                        setTimeout(typeWriter, 30 + Math.random() * 50); // Random typing speed for realism
                    } else {
                        // Line finished
                        currentLineElement = null;
                        charIndex = 0;
                        lineIndex++;
                        setTimeout(typeWriter, 400); // Pause between lines
                    }
                }
            }
            
            // Start typing after a short delay
            setTimeout(typeWriter, 800);


            // --- 2. Parallax & 3D Tilt Engine ---
            const card = document.getElementById('mainCard');
            const stickers = document.querySelectorAll('.sticker');

            document.addEventListener('mousemove', (e) => {
                const x = (window.innerWidth - e.pageX * 2) / 100;
                const y = (window.innerHeight - e.pageY * 2) / 100;

                // Subtle tilt of the main card
                card.style.transform = `rotateY(${x * 0.5}deg) rotateX(${y * 0.5}deg)`;

                // Parallax movement for stickers
                stickers.forEach(sticker => {
                    const speed = sticker.getAttribute('data-speed');
                    const moveX = (window.innerWidth / 2 - e.pageX) * speed / 100;
                    const moveY = (window.innerHeight / 2 - e.pageY) * speed / 100;
                    
                    // We use translate3d to combine the parallax with the existing CSS animation/rotation
                    // Note: This overrides the 'transform' in CSS, so we must preserve the rotation logic or use margins
                    // To keep it simple and compatible with the float animation, we adjust margins instead or wrap them.
                    // For a cleaner implementation with existing animations, we will apply the parallax to the *parent* concept or use margins.
                    // However, a simpler "JS Parallax" that works with CSS animations is usually setting style variables or top/left.
                    
                    // Let's stick to modifying top/left slightly for parallax to avoid breaking the CSS keyframes rotation
                    sticker.style.marginLeft = `${moveX}px`;
                    sticker.style.marginTop = `${moveY}px`;
                });
            });
            
            // Reset on mouse leave
            document.addEventListener('mouseleave', () => {
                card.style.transform = `rotateY(0deg) rotateX(0deg)`;
                stickers.forEach(sticker => {
                    sticker.style.marginLeft = `0px`;
                    sticker.style.marginTop = `0px`;
                });
            });
        });
    </script>
</body>
</html>
