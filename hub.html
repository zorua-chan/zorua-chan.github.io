<!DOCTYPE html>

<head>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Balsamiq+Sans:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Lighter, pinkish-reddish glassmorphism matrix */
            --glass-bg: rgba(255, 105, 180, 0.15);
            --glass-border: rgba(255, 105, 180, 0.4);
            --neon-pink: rgba(255, 105, 180, 0.8);
            --terminal-text: #fce7f3; /* text-pink-100 */
        }
        
        body { 
            background-color: #070709; 
            overflow-x: hidden; /* Prevent horizontal scroll from protruding stickers */
            font-family: 'Courier New', monospace; 
            color: var(--terminal-text);
        }

        /* The Aesthetic Engine - Base Layer */
        .scanlines {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 6px 100%; 
            z-index: 1; 
            pointer-events: none;
        }

        #glitter-engine { position: fixed; top: 0; left: 0; z-index: 0; pointer-events: none; }

        /* The Hub Terminal Container */
        .glass-terminal {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6), inset 0 0 20px rgba(255, 105, 180, 0.1);
            /* Ensure the box itself doesn't hide overflowing assets like Luxray */
            overflow: visible; 
        }

        /* Typographic Overrides */
        .glow-title { text-shadow: 0 0 15px var(--neon-pink), 0 0 5px rgba(255, 255, 255, 0.5); }
        .whimsy-font { font-family: 'Balsamiq Sans', cursive; }

        /* Dynamic Glitch Hover for the Button */
        .btn-glitch {
            transition: all 0.2s ease-in-out;
            box-shadow: 4px 4px 0px rgba(255, 77, 77, 0.8);
        }
        .btn-glitch:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px rgba(255, 105, 180, 0.9);
            text-shadow: 2px 2px 0px rgba(0, 0, 0, 0.3);
        }
        .btn-glitch:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px transparent;
        }

        /* Sticker Physics (Hover behaviors for the chaotic elements) */
        .sticker { transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); filter: drop-shadow(0 8px 10px rgba(0,0,0,0.5)); }
        .sticker:hover { transform: scale(1.15) rotate(0deg) !important; z-index: 50; }
    </style>
</head>
<body class="w-screen min-h-screen selection:bg-pink-500/30 flex flex-col items-center pt-20 pb-40">

        <div class="mt-12 flex flex-col md:flex-row items-center justify-end gap-4 relative z-20 border-t border-pink-400/20 pt-6">
            
            <div class="flex items-center gap-3">

    </main>

    <script>
        const canvas = document.getElementById('glitter-engine');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particlesArray = [];
        const colors = ['rgba(255, 105, 180, 0.6)', 'rgba(255, 182, 193, 0.6)', 'rgba(255, 77, 77, 0.5)', 'rgba(255, 255, 255, 0.3)'];

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedY = Math.random() * 1.5 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.opacity = Math.random() * 0.5 + 0.2;
            }
            update() {
                this.y -= this.speedY; // Floating up instead of down for the hub
                this.x += this.speedX;
                if (this.y < 0) {
                    this.y = canvas.height + this.size;
                    this.x = Math.random() * canvas.width;
                }
            }
            draw() {
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            for (let i = 0; i < 150; i++) particlesArray.push(new Particle());
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            requestAnimationFrame(animateParticles);
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        initParticles();
        animateParticles();
    </script>
</body>
