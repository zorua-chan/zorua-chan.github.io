<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUB // CENTRAL_NEXUS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(20, 20, 25, 0.6); 
            --glass-border: rgba(255, 105, 180, 0.3);
            --neon-pink: #ff69b4;
            --neon-glow: 0 0 10px var(--neon-pink), 0 0 20px var(--neon-pink);
            --terminal-font: 'Fira Code', 'Courier New', monospace;
            --whimsy-font: 'Comic Neue', cursive;
        }

        body {
            background-color: #070709;
            /* Advanced animated grid background */
            background-image: 
                linear-gradient(rgba(255, 77, 106, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 77, 106, 0.03) 1px, transparent 1px),
                radial-gradient(circle at 50% 50%, rgba(255, 77, 106, 0.08) 0%, transparent 70%);
            background-size: 40px 40px, 40px 40px, 100% 100%;
            font-family: var(--terminal-font);
            color: #fce7f3;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; /* Prevent scrollbars from parallax */
            cursor: crosshair;
            perspective: 1000px; /* Enable 3D space */
        }

        /* CRT Overlay Effect */
        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
            z-index: 999;
            opacity: 0.6;
        }
        .vignette {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle, transparent 60%, rgba(0,0,0,0.8) 100%);
            pointer-events: none;
            z-index: 998;
        }

        /* Glassmorphism Architecture - Enhanced */
        .terminal-box {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: 
                0 20px 50px rgba(0, 0, 0, 0.8),
                inset 0 0 0 1px rgba(255, 255, 255, 0.05),
                0 0 30px rgba(255, 105, 180, 0.15);
            position: relative;
            transform-style: preserve-3d; /* For 3D transforms */
            transition: transform 0.1s ease-out; /* Smooth parallax lag */
        }

        /* Typography Highlights */
        .glow-title { 
            text-shadow: 0 0 15px var(--neon-pink); 
            position: relative;
            display: inline-block;
        }
        .glow-border { 
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.4); 
            transition: box-shadow 0.3s ease;
        }
        .glow-border:hover {
            box-shadow: 0 0 30px rgba(255, 105, 180, 0.8);
        }

        /* Advanced Sticker Physics */
        .sticker {
            position: absolute;
            z-index: 10;
            pointer-events: auto; /* Allow interaction */
            cursor: grab;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.6));
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), filter 0.3s ease;
            user-select: none;
            will-change: transform;
        }
        .sticker:hover {
            z-index: 50; /* Bring to front on hover */
            filter: drop-shadow(0 20px 25px rgba(0,0,0,0.8)) brightness(1.1);
            transform: scale(1.1) rotate(0deg) !important; /* Reset rotation on hover for clarity */
        }
        .sticker:active {
            cursor: grabbing;
            transform: scale(0.95) !important;
        }

        /* Floating Animation Keyframes */
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(var(--rot)); }
            50% { transform: translateY(-15px) rotate(var(--rot)); }
        }

        /* Text Containment & Typing Effect */
        .lore-matrix {
            position: relative;
            z-index: 20;
            background: rgba(0, 0, 0, 0.5);
            border: 1px dashed rgba(255, 105, 180, 0.4);
            backdrop-filter: blur(5px);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        .lore-line {
            opacity: 0; /* Hidden initially for JS typewriter */
            transform: translateX(-10px);
            transition: all 0.3s ease;
        }
        .lore-line.visible {
            opacity: 1;
            transform: translateX(0);
        }

        .cursor-blink {
            display: inline-block;
            width: 8px;
            height: 1.2em;
            background-color: var(--neon-pink);
            animation: blink 1s step-end infinite;
            vertical-align: text-bottom;
            margin-left: 2px;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* Advanced Button Dynamics */
        .btn-whimsy {
            font-family: var(--whimsy-font);
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .btn-whimsy::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: 0.5s;
        }
        
        .btn-whimsy:hover::before {
            left: 100%;
        }

        .btn-whimsy:hover {
            transform: scale(1.1) rotate(-2deg);
            box-shadow: 0 0 40px rgba(255, 77, 77, 0.8), inset 0 0 20px rgba(255,255,255,0.2);
            text-shadow: 0 0 5px rgba(255,255,255,0.8);
        }

        .btn-whimsy:active {
            transform: scale(0.95);
        }

        /* Glitch Animation for Title */
        @keyframes glitch-skew {
            0% { transform: skew(0deg); }
            20% { transform: skew(-2deg); }
            40% { transform: skew(2deg); }
            60% { transform: skew(-1deg); }
            80% { transform: skew(1deg); }
            100% { transform: skew(0deg); }
        }
        .glitch-hover:hover {
            animation: glitch-skew 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) both infinite;
            color: #fff;
        }
    </style>
</head>
<body class="selection:bg-pink-500/50 selection:text-white">

    <script>
        // --- Configuration ---
        const loreData = [
            "balkanese tomboy :P",
            "good at rimac simping and still lazy writing codes in snek c:",
            "aspiring pentester and malware analyst",
            "lover of chocolate",
            "cats are great meow",
            "founder of shinxism cult - do study or procastrinate, thats da question"
        ];

        // --- Typewriter Effect ---
        const typeContainer = document.getElementById('typewriter-container');
        
        async function typeWriter() {
            for (let i = 0; i < loreData.length; i++) {
                // Create line element
                const lineDiv = document.createElement('div');
                lineDiv.className = 'flex items-start gap-3 lore-line';
                
                const prompt = document.createElement('span');
                prompt.className = 'text-pink-500 font-bold mt-1';
                prompt.textContent = '>';
                
                const textP = document.createElement('p');
                textP.className = 'typewriter-text';
                
                lineDiv.appendChild(prompt);
                lineDiv.appendChild(textP);
                typeContainer.appendChild(lineDiv);

                // Reveal line
                requestAnimationFrame(() => {
                    lineDiv.classList.add('visible');
                });

                // Type characters
                const text = loreData[i];
                for (let charIndex = 0; charIndex < text.length; charIndex++) {
                    textP.textContent += text[charIndex];
                    // Random typing speed variation for realism
                    await new Promise(r => setTimeout(r, Math.random() * 30 + 20)); 
                }
                
                // Pause between lines
                await new Promise(r => setTimeout(r, 300));
            }
        }

        // Start typing after a short delay
        setTimeout(typeWriter, 800);


        // --- Parallax & Mouse Tilt Effect ---
        const mainContainer = document.getElementById('main-container');
        const stickers = document.querySelectorAll('.sticker');

        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 25;
            const y = (window.innerHeight / 2 - e.pageY) / 25;

            // Rotate the main container slightly (Card Tilt)
            mainContainer.style.transform = `rotateY(${x * 0.5}deg) rotateX(${y * 0.5}deg)`;

            // Move stickers in opposite direction (Depth)
            stickers.forEach((sticker, index) => {
                const speed = (index % 3) + 1; // Varying speeds
                // We must preserve the bottom translate for Luxray, so we read it or handle carefully.
                // For simplicity, we apply parallax to transform but we need to be careful not to override CSS animation keyframes.
                // Instead, we will use margins or translate3d on a wrapper, OR just simple transform addition if not animating via keyframes.
                // Since we have keyframes, let's use CSS Variables updated by JS.
                
                // Note: Combining Keyframes (translateY) with JS Parallax (translate) is tricky.
                // Alternative: Parallax the container they are in, or use specific calc().
                
                // Simple Approach: Move the sticker slightly based on mouse
                // We add this to the existing style transform via inline style override, 
                // but this breaks the keyframe animation.
                
                // BETTER APPROACH for this specific code structure:
                // Apply the parallax to the *background* or the *main container* only,
                // and let the stickers float via CSS as they were.
                // However, to make it "Advanced", let's move the stickers using transform 
                // but we need to respect the floating animation.
            });
        });

        // --- Draggable Stickers Logic (Advanced Interaction) ---
        stickers.forEach(sticker => {
            let isDragging = false;
            let startX, startY, initialLeft, initialTop;

            sticker.addEventListener('mousedown', (e) => {
                isDragging = true;
                startX = e.clientX;
                startY = e.clientY;
                
                const rect = sticker.getBoundingClientRect();
                const parentRect = sticker.parentElement.getBoundingClientRect();
                
                // Calculate offset relative to parent
                initialLeft = sticker.offsetLeft;
                initialTop = sticker.offsetTop;
                
                sticker.style.cursor = 'grabbing';
                sticker.style.animation = 'none'; // Pause floating while dragging
            });

            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                
                const dx = e.clientX - startX;
                const dy = e.clientY - startY;
                
                sticker.style.left = `${initialLeft + dx}px`;
                sticker.style.top = `${initialTop + dy}px`;
                sticker.style.bottom = 'auto'; // Disable bottom positioning if dragged
                sticker.style.right = 'auto';  // Disable right positioning if dragged
            });

            window.addEventListener('mouseup', () => {
                if(isDragging) {
                    isDragging = false;
                    sticker.style.cursor = 'grab';
                    // Optional: Resume floating with a delay or leave it static where dropped?
                    // Let's leave it static to respect user placement.
                }
            });
        });

    </script>
