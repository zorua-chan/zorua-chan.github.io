<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUB // INFO_TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 105, 180, 0.08);
            --glass-border: rgba(255, 105, 180, 0.25);
            --pastel-pink: #ffb6c1;
        }
        
        body { 
            background-color: #070709; 
            overflow-x: hidden; 
            font-family: 'Courier New', monospace; 
        }

        /* Re-initializing the Aesthetic Engine */
        .scanlines {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 6px 100%; 
            z-index: -10; 
            pointer-events: none;
        }

        #glitter-engine { position: fixed; top: 0; left: 0; z-index: -20; }

        /* Hub Terminal Container */
        .info-terminal {
            background: var(--glass-bg);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6), inset 0 0 20px rgba(255, 105, 180, 0.1);
            /* overflow-hidden contains Luxray at the bottom edge cleanly */
            overflow: hidden; 
        }

        /* Typography & Glows */
        .glow-header { text-shadow: 0 0 15px rgba(255, 105, 180, 0.8), 0 0 30px rgba(255, 77, 77, 0.4); }
        .terminal-text { text-shadow: 0 0 5px rgba(255, 182, 193, 0.4); }
        
        /* Whimsical Button Logic */
        .btn-whimsy {
            font-family: 'Fredoka', sans-serif;
            background: linear-gradient(135deg, #ff7eb3, #ff758c);
            box-shadow: 0 6px 0 #c2385a, 0 15px 20px rgba(255, 105, 180, 0.4);
            transition: all 0.15s ease-in-out;
        }
        .btn-whimsy:active {
            transform: translateY(6px);
            box-shadow: 0 0px 0 #c2385a, 0 5px 10px rgba(255, 105, 180, 0.4);
        }
        .btn-whimsy:hover {
            filter: brightness(1.1);
        }

        /* Sticker Hover Physics */
        .sticker {
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.3s;
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.5));
        }
        .sticker:hover {
            transform: scale(1.1) rotate(0deg) !important;
            filter: drop-shadow(0 12px 20px rgba(255,105,180,0.6));
            z-index: 50;
        }
    </style>
</head>
<body class="min-h-screen w-screen flex items-center justify-center p-4 sm:p-8 selection:bg-pink-500/30">

    <canvas id="glitter-engine"></canvas>
    <div class="scanlines"></div>

    <main class="info-terminal relative w-full max-w-5xl rounded-2xl flex flex-col min-h-[550px]">
        
        <header class="relative z-30 flex items-center gap-6 p-6 border-b border-pink-500/20 bg-black/20">
            <img src="zoruapfp.jpg" alt="Zorua Profile" class="w-20 h-20 sm:w-24 sm:h-24 object-cover rounded-xl border-2 border-pink-400 shadow-[0_0_20px_rgba(255,105,180,0.7)] rotate-[10deg] transition-transform duration-300 hover:rotate-0">
            
            <h1 class="text-3xl sm:text-5xl font-black text-pink-100 glow-header tracking-widest whitespace-nowrap">
                ZORUA // SHINX
            </h1>
        </header>

        <div class="relative flex-1 w-full p-6 sm:p-8 z-10 flex flex-col md:flex-row justify-between">
            
            <div class="relative z-20 flex flex-col gap-3 text-pink-100/90 terminal-text text-sm sm:text-base md:w-3/5">
                <p class="hover:text-white transition-colors">> balkanese tomboy :P</p>
                <p class="hover:text-white transition-colors">> good at rimac simping and still lazy writing codes in snek c:</p>
                <p class="hover:text-white transition-colors">> aspiring pentester and malware analyst</p>
                <p class="hover:text-white transition-colors">> lover of chocolate</p>
                <p class="hover:text-white transition-colors">> cats are great <i class="text-pink-300">*meow*</i></p>
                <p class="hover:text-white transition-colors">> founder of shinxism cult - do study or procastrinate, thats da question</p>
                
                <div class="mt-8 flex flex-col items-start gap-2 relative">
                    <div class="flex items-end gap-3">
                        <span class="text-pink-300 font-bold rotate-[-3deg] text-lg">Wanna join? :P</span>
                        <svg width="40" height="40" viewBox="0 0 40 40" fill="none" stroke="var(--pastel-pink)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="transform: rotate(15deg) translateY(-5px);">
                            <path d="M5 20 Q 20 10 35 25 M 25 25 L 35 25 L 35 15" />
                        </svg>
                    </div>
                    
                    <a href="shinxism.html" class="btn-whimsy mt-2 px-8 py-3 rounded-full text-white text-2xl tracking-wide outline-none ml-8">
                        ENTER
                    </a>
                </div>
            </div>

            <img src="croatia.png" alt="Croatia Nationality" class="sticker absolute top-8 right-8 w-28 sm:w-36 rotate-[12deg] z-10">
            
            <img src="gcat.png" alt="Germany Cat" class="sticker absolute top-[40%] right-24 w-32 sm:w-40 rotate-[-8deg] z-10">
            
            <img src="pythowo.png" alt="Python uwu" class="sticker absolute bottom-20 right-8 w-24 sm:w-32 rotate-[15deg] z-10">
            
            <img src="zorua-hisui.png" alt="Hisuian Zorua" class="sticker absolute bottom-12 left-[45%] w-36 sm:w-48 rotate-[-5deg] z-10">
            
            <img src="luxray.png" alt="Luxray Entity" class="absolute bottom-0 right-[35%] w-40 sm:w-56 object-bottom object-contain z-0 filter drop-shadow-[0_-5px_15px_rgba(255,255,0,0.2)]">

        </div>
    </main>

    <script>
        const canvas = document.getElementById('glitter-engine');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particlesArray = [];
        const colors = ['rgba(255, 105, 180, 0.6)', 'rgba(255, 182, 193, 0.6)', 'rgba(255, 77, 77, 0.6)', 'rgba(255, 255, 255, 0.3)'];

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height - canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedY = Math.random() * 1.5 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.opacity = Math.random() * 0.5 + 0.1;
            }
            update() {
                this.y += this.speedY;
                this.x += this.speedX;
                if (this.y > canvas.height) {
                    this.y = 0 - this.size;
                    this.x = Math.random() * canvas.width;
                }
            }
            draw() {
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            for (let i = 0; i < 120; i++) particlesArray.push(new Particle());
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            requestAnimationFrame(animateParticles);
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        initParticles();
        animateParticles();
    </script>
</body>
</html>
